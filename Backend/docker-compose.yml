services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    env_file: judge0.conf
    restart: always

  workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    env_file: judge0.conf
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - judge0_postgres:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7.2.4
    command: ["bash", "-c", "redis-server --daemonize no --requirepass \"$$REDIS_PASSWORD\""]
    env_file: judge0.conf
    ports:
      - "6380:6379"
    restart: always

volumes:
  judge0_postgres: